name: Positano Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node sync.js
        env:
          ML_TOKEN: ${{ secrets.ML_TOKEN }}
          TN_TOKEN: ${{ secrets.TN_TOKEN }}
          STORE_ID: ${{ secrets.STORE_ID }}
